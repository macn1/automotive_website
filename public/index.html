<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>AJP Automotive </title>    <!-- SEO Description -->
    <meta
      name="description"
      content="AJP Automotive provides premium automotive services including mechanical repairs, detailing, tuning, paint shop services, and classic restorations."
    />

    <!-- SEO Extras -->
    <meta
      name="keywords"
      content="AJP Automotive, car service, detailing, tuning, paint shop, restorations, automotive workshop"
    />
    <meta name="author" content="AJP Automotive" />

    <!-- Social Media Preview (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:title" content="AJP Automotive" />
    <meta
      property="og:description"
      content="Premium automotive services including detailing, tuning, paint shop, and restorations."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
   
  </body>
</html>
